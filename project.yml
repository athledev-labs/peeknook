# XcodeGen spec for Peeknook.app — mirrors OpenNook's thin app target pattern.

name: Peeknook
options:
  bundleIdPrefix: com.peeknook
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
    Release:
      # Automatic signing + DEVELOPMENT_TEAM; export uses developer-id (see release.sh).
      DEVELOPMENT_TEAM: ${PEEKNOOK_DEVELOPMENT_TEAM:}

packages:
  Peeknook:
    path: "."
  # Set OPENNOOK_PACKAGE_PATH before generate (see Scripts/regenerate-xcodeproj.sh).
  # XcodeGen does not support ${VAR:-default} bash syntax in paths.
  Nook:
    path: ${OPENNOOK_PACKAGE_PATH}

targets:
  PeeknookHostApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "Peeknook.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeknook.app
        PRODUCT_NAME: Peeknook
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Peeknook.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          DEVELOPMENT_TEAM: ${PEEKNOOK_DEVELOPMENT_TEAM:}
    dependencies:
      - package: Peeknook
        product: PeeknookHost
      - package: Nook
        product: NookApp

  PeeknookUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: UITests
    dependencies:
      - target: PeeknookHostApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeknook.app.uitests
        TEST_TARGET_NAME: PeeknookHostApp
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          ENABLE_HARDENED_RUNTIME: NO

schemes:
  Peeknook:
    build:
      targets:
        PeeknookHostApp: all
    test:
      targets:
        - PeeknookUITests
