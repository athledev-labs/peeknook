# XcodeGen spec for Peeknook.app — mirrors OpenNook's thin app target pattern.

name: Peeknook
options:
  bundleIdPrefix: com.peeknook
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Peeknook:
    path: "."
  Nook:
    path: "../opennook"

targets:
  PeeknookHostApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "Peeknook.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeknook.app
        PRODUCT_NAME: Peeknook
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    dependencies:
      - package: Peeknook
        product: PeeknookHost
      - package: Nook
        product: NookApp
