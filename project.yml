# XcodeGen spec for Peeknook.app — mirrors OpenNook's thin app target pattern.

name: Peeknook
options:
  bundleIdPrefix: com.peeknook
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
    Release:
      # Export/signing: set PEEKNOOK_DEVELOPMENT_TEAM and PEEKNOOK_CODE_SIGN_IDENTITY
      # (default "Developer ID Application") before ./Scripts/release.sh
      CODE_SIGN_IDENTITY: ${PEEKNOOK_CODE_SIGN_IDENTITY:--}
      DEVELOPMENT_TEAM: ${PEEKNOOK_DEVELOPMENT_TEAM:}

packages:
  Peeknook:
    path: "."
  # Local dev: sibling ../opennook checkout (mirrors Package.swift path pin).
  # CI checks out opennook beside peeknook; override with OPENNOOK_PACKAGE_PATH if needed.
  # Unlike Package.swift, XcodeGen cannot auto-fallback to the git URL — regenerate only
  # when ../opennook/Package.swift exists or set OPENNOOK_PACKAGE_PATH to a local clone.
  Nook:
    path: ${OPENNOOK_PACKAGE_PATH:-../opennook}

targets:
  PeeknookHostApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "Peeknook.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeknook.app
        PRODUCT_NAME: Peeknook
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: App/Peeknook.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
        Release:
          CODE_SIGN_IDENTITY: ${PEEKNOOK_CODE_SIGN_IDENTITY:--}
          DEVELOPMENT_TEAM: ${PEEKNOOK_DEVELOPMENT_TEAM:}
    dependencies:
      - package: Peeknook
        product: PeeknookHost
      - package: Nook
        product: NookApp

  PeeknookUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: UITests
    dependencies:
      - target: PeeknookHostApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeknook.app.uitests
        TEST_TARGET_NAME: Peeknook
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""

schemes:
  Peeknook:
    build:
      targets:
        PeeknookHostApp: all
    test:
      targets:
        - PeeknookUITests
