name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout Peeknook
        uses: actions/checkout@v4
        with:
          path: peeknook

      # Sibling checkout satisfies Package.swift ../opennook path pin.
      # Pin to main: Peeknook uses OpenNook APIs (e.g. moduleBreadcrumb) not in v0.2.0.
      - name: Checkout OpenNook
        uses: actions/checkout@v4
        with:
          repository: glendonC/opennook
          ref: main
          path: opennook

      - name: Swift test
        working-directory: peeknook
        run: swift test
