name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout Peeknook
        uses: actions/checkout@v4
        with:
          path: peeknook

      # Sibling checkout satisfies Package.swift ../opennook path pin.
      # Pinned to the v0.3.0 tag: it is the first release with the OpenNook APIs
      # Peeknook uses (moduleBreadcrumb, NookContentInsets, the accent controls).
      - name: Checkout OpenNook
        uses: actions/checkout@v4
        with:
          repository: glendonC/opennook
          ref: v0.3.0
          path: opennook

      # OpenNook's Liquid Glass surface style references the macOS 26 SDK
      # (Glass / .glassEffect); the runner's default Xcode lacks it, so select
      # latest-stable, which carries the SDK.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift test
        working-directory: peeknook
        run: swift test
